# Python 3.12 app runtime base — includes bash and git.
#
# Variant of python.apko.yaml (3.13, distroless) for services that need:
#   - python-3.12 (requires-python >=3.12,<4)
#   - bash  — shell-based entrypoints that use bash-specific syntax ([[ ]], ${VAR,,})
#   - git   — runtime use (e.g. cloning repos at runtime)
#   - app user (uid/gid 1000)
#
# Python packages are layered on top via crane append in each service's deploy
# workflow (uv pip install --prefix layer/usr/local). The interpreter lives at
# /usr/bin/python3.12; packages installed with --prefix /usr/local land in
# /usr/local/lib/python3.12/site-packages/ (on Python's default sys.path).
#
# Use python.apko.yaml (distroless, no shell) when the entrypoint is a static
# binary or python -m invocation — that image is smaller and more hardened.
contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - python-3.12
    - bash          # entrypoint.sh uses [[, ${VAR,,} (bash-specific)
    - git           # runtime: clone repos at runtime

accounts:
  groups:
    - groupname: app
      gid: 1000
  users:
    - username: app
      uid: 1000
      gid: 1000
  run-as: 1000

archs:
  - x86_64
