# Wolfi Node.js runtime base — DEV variant: same as node.apko.yaml + busybox,
# so you can `kubectl exec ... -- sh` / poke around. NOT for production app images;
# use the shell-less node.apko.yaml as the real `crane append` base.
contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - busybox
    - nodejs-22

accounts:
  groups:
    - groupname: node
      gid: 1000
  users:
    - username: node
      uid: 1000
      gid: 1000
  run-as: 1000

environment:
  NODE_ENV: production

entrypoint:
  command: /usr/bin/node

archs:
  - x86_64
