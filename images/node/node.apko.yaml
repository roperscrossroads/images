# Wolfi Node.js runtime base — minimal, distroless (no shell), runs as uid 1000.
# Built with apko (no RUN, low-privilege) and rebuilt nightly for freshness.
# Consumed by COPY-only app images via `crane append -b <this>`.
contents:
  repositories:
    - https://packages.wolfi.dev/os
  keyring:
    - https://packages.wolfi.dev/os/wolfi-signing.rsa.pub
  packages:
    - wolfi-baselayout
    - ca-certificates-bundle
    - nodejs-22

accounts:
  groups:
    - groupname: node
      gid: 1000
  users:
    - username: node
      uid: 1000
      gid: 1000
  run-as: 1000

environment:
  NODE_ENV: production

entrypoint:
  command: /usr/bin/node

archs:
  - x86_64
